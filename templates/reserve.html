<!DOCTYPE html>
<html>
<head>
    <title>Reserve Seat</title>
    <style>
        body {
            background-color: rgb(158, 190, 232);
        }

        .reserve-box {
            background-color: white;
            padding: 10px 30px;
            border: 2px solid black;
            width: 440px;
        }

        .reserve-box h2, h1 {
            font-family: Arial, Helvetica, sans-serif;
        }

        hr {
            height: 2px;
            background-color: black;
        }

        .reserve-box form button:hover {
            background-color: rgb(102, 102, 102);
        }
    </style>
</head>
<body>

    <br>
    <h1><a href="/" style="text-decoration: none;">Home</a></h1>
    <hr>
    <div class="reserve-box">
        <h2>Reserve a Seat</h2>

        {% if error %}
            <p style="color:red;">{{ error }}</p>
        {% endif %}
        
        <form method="post">
            <div style="margin-bottom: 10px;">
                First Name: <input type="text" name="first_name" placeholder="First Name">
            </div>
            <div style="margin-bottom: 10px;">
                Last Name: <input type="text" name="last_name" placeholder="Last Name">
            </div>
            <div style="margin-bottom: 10px;">
                Seat Row (1-12): <input type="number" min="1" max="12" name="seat_row">
            </div>
            <div style="margin-bottom: 10px;">
                Seat Column (1-4): <input type="number" min="1" max="4" name="seat_col">
            </div>
            <input type="submit" value="Reserve">
        </form>
    </div>

    <!-- <a href="/">Back to Main</a> -->
</body>
</html>
